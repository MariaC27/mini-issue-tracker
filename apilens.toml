[apilens]
# Dotted import path to your FastAPI app object — same as you'd pass to uvicorn
# Example: "myapp.main:app" for a file at myapp/main.py with a variable named app
app = "app.main:app"

# Directory where snapshot JSON files will be stored (relative to project root)
# This folder will be created automatically and committed to your repo
snapshots_dir = "openapi-snapshots"

# Set to false to disable PR comments (default: true)
pr_comments = true

# Host and port for `apilens serve` (optional, these are the defaults)
host = "127.0.0.1"
port = 8765
